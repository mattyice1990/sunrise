<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<title>Sunrise GBP — Post Review</title>
<style>
  :root{
    --bg:#0f1216;--panel:#181d23;--bd:#2a323b;--tx:#e9eef3;--mut:#8b98a5;
    --acc:#f5a623;--grn:#2ea043;--red:#f85149;--blue:#1a73e8;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:5}
  header h1{font-size:17px;margin:0;font-weight:600}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 20px 80px}
  .gate{max-width:420px;margin:90px auto;text-align:center}
  input,textarea,select{background:#0d1117;color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:10px;font:inherit}
  input,textarea{width:100%}
  textarea{min-height:120px;resize:vertical;line-height:1.45}
  .btn{cursor:pointer;border:1px solid var(--bd);background:#202832;color:var(--tx);padding:9px 16px;border-radius:8px;font:inherit;font-weight:500}
  .btn:hover{filter:brightness(1.12)}
  .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn.green{background:var(--grn);border-color:var(--grn);color:#fff}
  .btn:disabled{opacity:.5;cursor:default}
  .badge{font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:3px 10px;border-radius:999px;border:1px solid var(--bd);color:var(--mut)}
  .badge.new{color:var(--acc);border-color:var(--acc)}
  .badge.draft{color:#7cc4ff;border-color:#7cc4ff}
  .badge.published{color:var(--grn);border-color:var(--grn)}
  .badge.scheduled{color:#c792ea;border-color:#c792ea}
  .badge.failed{color:var(--red);border-color:var(--red)}
  .card{background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:18px;margin:0 0 20px}
  .cardhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .meta{color:var(--mut);font-size:13px}
  .cols{display:flex;gap:22px;flex-wrap:wrap}
  .col{flex:1;min-width:300px}
  .col h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:0 0 10px}
  /* GBP-style preview */
  .gbp{background:#fff;color:#202124;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.4);max-width:380px}
  .gbp .ph{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#e8eaed}
  .gbp .ph.contain{object-fit:contain;background:#fff}
  .gbp .noimg{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;color:#9aa0a6;background:#f1f3f4;font-size:13px}
  .gbp .body{padding:14px 16px 16px}
  .gbp .biz{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .gbp .biz .dot{width:26px;height:26px;border-radius:50%;background:#1a73e8;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .gbp .biz b{font-size:13px;color:#202124}
  .gbp .biz span{font-size:12px;color:#5f6368}
  .gbp .txt{font-size:14px;color:#3c4043;white-space:pre-wrap;margin:0 0 14px}
  .gbp .cta{display:inline-block;color:var(--blue);font-weight:600;font-size:14px;border-top:1px solid #ececec;padding-top:12px;width:100%}
  .ctaRow{display:flex;gap:8px;margin:10px 0}
  .ctaRow select{flex:0 0 150px}
  .actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .imgs{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .imgs img{width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--bd)}
  .err{color:var(--red);font-size:13px;margin-top:8px}
  .ok{color:var(--grn);font-size:13px;margin-top:8px}
  .empty{color:var(--mut);text-align:center;padding:60px 0}
  .note{color:var(--mut);font-size:13px;margin:4px 0 0}
  /* Scheduler calendar */
  .cal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:none;align-items:center;justify-content:center}
  .cal-bg.open{display:flex}
  .cal{background:var(--panel);border:1px solid var(--bd);border-radius:16px;width:400px;max-width:94vw;padding:20px}
  .cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-hd b{font-size:17px}
  .cal-nav{display:flex;gap:6px}
  .cal-nav .btn{padding:6px 12px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-dow{font-size:11px;color:var(--mut);text-align:center;padding:2px 0}
  .cal-day{aspect-ratio:1;border:1px solid var(--bd);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;position:relative;background:#0d1117}
  .cal-day:hover{border-color:var(--blue)}
  .cal-day.muted{opacity:.28;cursor:default;border-color:transparent}
  .cal-day.muted:hover{border-color:transparent}
  .cal-day.today{border-color:var(--acc)}
  .cal-day.sel{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
  .cal-day .dot{width:5px;height:5px;border-radius:50%;background:var(--grn);position:absolute;bottom:5px}
  .cal-day.sel .dot{background:#fff}
  .cal-time{display:flex;gap:8px;align-items:center;margin-top:14px}
  .cal-list{margin-top:8px;max-height:120px;overflow:auto}
  .cal-list .it{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12.5px;color:var(--mut)}
</style>
</head>
<body>
<div id="gate" class="gate">
  <h1>Sunrise GBP — Post Review</h1>
  <p class="meta">Enter your access token to continue.</p>
  <input id="token" type="password" placeholder="Access token" autocomplete="off">
  <p><button class="btn primary" onclick="saveToken()">Enter</button></p>
  <p id="gateErr" class="err"></p>
</div>

<div id="app" style="display:none">
  <header>
    <h1>Sunrise GBP — Post Review</h1>
    <div>
      <button class="btn" onclick="load()">↻ Reload</button>
      <button class="btn" onclick="logout()">Sign out</button>
    </div>
  </header>
  <div class="wrap" id="list"><p class="empty">Loading…</p></div>
</div>

<div id="cal-bg" class="cal-bg"><div class="cal" id="cal"></div></div>

<script>
const CTA=['NONE','CALL','LEARN_MORE','BOOK','ORDER','SHOP','SIGN_UP'];
const CTA_LABEL={NONE:'(no button)',CALL:'Call now',LEARN_MORE:'Learn more',BOOK:'Book',ORDER:'Order online',SHOP:'Shop',SIGN_UP:'Sign up'};
let TOKEN=sessionStorage.getItem('gbp_token')||'';

function saveToken(){const v=document.getElementById('token').value.trim();if(!v)return;TOKEN=v;sessionStorage.setItem('gbp_token',v);start();}
function logout(){sessionStorage.removeItem('gbp_token');location.reload();}
function start(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';load();}
async function api(path,opts={}){
  const res=await fetch(path,{...opts,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json',...(opts.headers||{})}});
  if(res.status===401)throw new Error('Unauthorized — check your token');
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.error||('HTTP '+res.status));
  return data;
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// Email links open /gbp-admin#post=<id> — scroll to and highlight that card.
function focusFromHash(){
  const m=/post=([^&]+)/.exec(location.hash||'');
  if(!m)return;
  const el=document.getElementById('card-'+decodeURIComponent(m[1]));
  if(el){el.scrollIntoView({behavior:'smooth',block:'start'});el.style.outline='2px solid var(--blue)';el.style.outlineOffset='3px';setTimeout(()=>{el.style.outline='';},3500);}
}

async function load(){
  const list=document.getElementById('list');
  list.innerHTML='<p class="empty">Loading…</p>';
  try{
    const {posts}=await api('/api/gbp-posts');
    if(!posts||!posts.length){list.innerHTML='<p class="empty">No submissions yet. Text photos to the WhatsApp number and they\'ll show up here.</p>';return;}
    ALLPOSTS=posts;
    posts.forEach(p=>{ CURRENT[p.id]=p.mediaUrls||[]; });
    list.innerHTML=posts.map(render).join('');
    posts.forEach(p=>{
      if(p.status==='draft'||p.status==='failed'||p.status==='scheduled'){
        wire(p.id);
        if((p.mediaUrls||[]).length>=1) setupComposite(p);
      }
    });
    focusFromHash();
  }catch(e){
    list.innerHTML='<p class="err">'+esc(e.message)+'</p>';
    if(/Unauthorized/.test(e.message))sessionStorage.removeItem('gbp_token');
  }
}

// Build the Google-Business-Profile-style preview card.
function previewCard(id,img,text,cta,isPair){
  const ctaHtml = cta&&cta!=='NONE' ? '<div class="cta" id="pv-cta-'+id+'">'+esc(CTA_LABEL[cta]||cta)+'</div>' : '<div class="cta" id="pv-cta-'+id+'" style="display:none"></div>';
  const imgHtml = '<img class="ph'+(isPair?' contain':'')+'" id="pv-img-'+id+'" src="'+esc(img||'')+'" alt="" style="'+(img?'':'display:none')+'">'+
    '<div class="noimg" id="pv-noimg-'+id+'" style="'+(img?'display:none':'')+'">No photo</div>';
  return '<div class="gbp">'+imgHtml+
    '<div class="body"><div class="biz"><div class="dot">S</div><div><b>Sunrise Roofing</b><br><span>Tucson, AZ · Roofing</span></div></div>'+
    '<p class="txt" id="pv-txt-'+id+'">'+esc(text||'')+'</p>'+ctaHtml+'</div></div>';
}

function render(p){
  const copy=p.finalCopy||p.draftCopy||'';
  const srcs=(p.mediaUrls||[]);
  const isPair=srcs.length>=2;
  const hasPhotos=srcs.length>=1;
  const img=p.compositeUrl||(isPair?'':(srcs[0]||''));
  const thumbs=srcs.map(u=>'<img src="'+esc(u)+'" alt="">').join('');
  const flag=p.qualityFlags&&p.qualityFlags.needsResend?'<p class="err">⚠ Claude flagged the photos: '+esc(p.qualityFlags.reason||'low quality')+'</p>':'';

  let right='';
  if(p.status==='new'){
    right='<p class="note">Photo + note received. Generate the post copy with Claude.</p>'+
      '<div class="imgs">'+thumbs+'</div>'+
      '<div class="actions"><button class="btn primary" onclick="gen(\''+p.id+'\',this)">✨ Generate draft</button></div>';
  }else if(p.status==='draft'||p.status==='failed'||p.status==='scheduled'){
    const opts=CTA.map(c=>'<option value="'+c+'" '+(c===(p.ctaType||'NONE')?'selected':'')+'>'+c+'</option>').join('');
    const pairCtrls = hasPhotos ?
      '<p class="note" id="comp-status-'+p.id+'">Preparing image…</p>'+
      (isPair?'<div class="actions"><button class="btn" id="swap-'+p.id+'" onclick="swapBA(\''+p.id+'\')">⇄ Swap before / after</button></div>':'')
      : '';
    const schedBanner = p.status==='scheduled'&&p.scheduledFor ?
      '<p class="ok">🕒 Scheduled for '+new Date(p.scheduledFor).toLocaleString()+' — publish now or pick a new time below.</p>' : '';
    right=schedBanner+
      '<textarea id="copy-'+p.id+'" maxlength="1500">'+esc(copy)+'</textarea>'+
      '<div class="meta" id="cnt-'+p.id+'">'+copy.length+'/1500</div>'+
      '<div class="ctaRow"><select id="cta-'+p.id+'">'+opts+'</select>'+
      '<input id="ctaurl-'+p.id+'" placeholder="CTA link (optional)" value="'+esc(p.ctaUrl||'')+'"></div>'+
      pairCtrls+
      (p.error?'<p class="err">'+esc(p.error)+'</p>':'')+
      '<div class="actions"><button class="btn green" id="pub-'+p.id+'"'+(hasPhotos?' disabled':'')+' onclick="publish(\''+p.id+'\',this)">✅ Approve &amp; Publish now</button>'+
      '<button class="btn" onclick="gen(\''+p.id+'\',this)">↻ Regenerate</button></div>'+
      '<div class="actions" style="margin-top:10px"><button class="btn" id="sch-'+p.id+'"'+(hasPhotos?' disabled':'')+' onclick="openScheduler(\''+p.id+'\')">🗓 Schedule for later…</button>'+
      (p.status==='scheduled'&&p.scheduledFor?'<span class="meta" style="align-self:center">📅 '+new Date(p.scheduledFor).toLocaleString()+'</span>':'')+'</div>';
  }else if(p.status==='published'){
    right='<p class="ok">✅ Published to Google Business Profile'+(p.publishedAt?' · '+new Date(p.publishedAt).toLocaleString():'')+'</p>'+
      (p.gbpPostId?'<p class="meta">'+esc(p.gbpPostId)+'</p>':'');
  }

  return '<div class="card" id="card-'+p.id+'"><div class="cardhead"><strong>'+esc(p.type||'submission')+'</strong>'+
    '<div style="display:flex;align-items:center;gap:10px"><span class="badge '+p.status+'">'+p.status+'</span>'+
    '<button class="btn" style="padding:6px 10px" title="Delete this submission" onclick="delPost(\''+p.id+'\')">🗑</button></div></div>'+
    '<p class="note">"'+esc(p.note||'(no note)')+'" · '+new Date(p.createdAt).toLocaleString()+'</p>'+flag+
    '<div class="cols"><div class="col"><h3>Preview on Google</h3>'+previewCard(p.id,img,copy,p.ctaType||'NONE',isPair)+'</div>'+
    '<div class="col"><h3>'+(p.status==='published'?'Status':'Edit & publish')+'</h3>'+right+'</div></div>'+
    channelsRow(p)+'</div>';
}

// Live-update the preview as the operator edits copy / CTA.
function wire(id){
  const ta=document.getElementById('copy-'+id), cta=document.getElementById('cta-'+id);
  if(ta) ta.addEventListener('input',()=>{
    document.getElementById('pv-txt-'+id).textContent=ta.value;
    document.getElementById('cnt-'+id).textContent=ta.value.length+'/1500';
  });
  if(cta) cta.addEventListener('change',()=>{
    const el=document.getElementById('pv-cta-'+id);
    if(cta.value==='NONE'){el.style.display='none';}
    else{el.style.display='block';el.textContent=({NONE:'',CALL:'Call now',LEARN_MORE:'Learn more',BOOK:'Book',ORDER:'Order online',SHOP:'Shop',SIGN_UP:'Sign up'})[cta.value]||cta.value;}
  });
}

// Multi-channel strip shown on every submission (GBP is the main flow above).
function channelsRow(p){
  var blog = p.blogUrl
    ? '<a class="btn" href="'+esc(p.blogUrl)+'" target="_blank" rel="noopener">📝 View blog ↗</a>'+
      '<button class="btn" id="blog-'+p.id+'" onclick="blogify(\''+p.id+'\',this)">↻ Re-write blog</button>'
    : '<button class="btn" id="blog-'+p.id+'" onclick="blogify(\''+p.id+'\',this)">📝 Write blog article</button>';
  return '<div style="margin-top:16px;border-top:1px solid var(--bd);padding-top:12px">'+
    '<div class="meta" style="margin-bottom:8px">Channels — publish this job to:</div>'+
    '<div class="actions">'+blog+
    '<button class="btn" disabled title="Coming soon — activates once your Meta app is approved">📘 Facebook (soon)</button>'+
    '<button class="btn" disabled title="Coming soon — activates once your Meta app is approved">📸 Instagram (soon)</button>'+
    '</div></div>';
}
async function delPost(id){
  if(!confirm('Delete this submission? Removes it from the queue and the website recent-work feed.\\n(It does NOT delete an already-published Google post — that lives on Google.)'))return;
  try{ await api('/api/gbp-delete',{method:'POST',body:JSON.stringify({id})}); await load(); }
  catch(e){ alert(e.message); }
}
async function blogify(id,btn){
  if(!confirm('Generate and publish an SEO blog article from this job to your /blog?'))return;
  btn.disabled=true;btn.textContent='Writing…';
  try{ const r=await api('/api/gbp-blog',{method:'POST',body:JSON.stringify({id})}); alert('Blog published:\n'+r.url); await load(); }
  catch(e){ alert(e.message); btn.disabled=false; btn.textContent='📝 Write blog article'; }
}
async function gen(id,btn){
  btn.disabled=true;btn.textContent='Generating…';
  try{await api('/api/gbp-generate',{method:'POST',body:JSON.stringify({id})});await load();}
  catch(e){alert(e.message);btn.disabled=false;btn.textContent='✨ Generate draft';}
}
async function publish(id,btn){
  if(!confirm('Publish this post to your live Google Business Profile?'))return;
  const copy=document.getElementById('copy-'+id).value;
  const ctaType=document.getElementById('cta-'+id).value;
  const ctaUrl=document.getElementById('ctaurl-'+id).value||null;
  btn.disabled=true;btn.textContent='Publishing…';
  const body={id,finalCopy:copy,ctaType,ctaUrl};
  const cu=COMP[id]&&COMP[id].compositeUrl;
  if(cu) body.mediaUrls=[cu];
  try{await api('/api/gbp-publish',{method:'POST',body:JSON.stringify(body)});await load();}
  catch(e){alert(e.message);btn.disabled=false;btn.textContent='✅ Approve & Publish now';}
}

/* ---- Visual calendar scheduler ---- */
let ALLPOSTS=[];
const SCHED={target:null, view:new Date(), sel:null};
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function scheduledByDate(){
  const m={};
  (ALLPOSTS||[]).forEach(p=>{ if(p.status==='scheduled'&&p.scheduledFor){ const k=ymd(new Date(p.scheduledFor)); (m[k]=m[k]||[]).push(p); } });
  return m;
}
function openScheduler(id){
  SCHED.target=id; SCHED.sel=null;
  const f=ALLPOSTS.find(p=>p.id===id);
  SCHED.view = f&&f.scheduledFor ? new Date(f.scheduledFor) : new Date();
  document.getElementById('cal-bg').classList.add('open'); renderCalendar();
}
function closeScheduler(){ document.getElementById('cal-bg').classList.remove('open'); }
function calMove(d){ SCHED.view=new Date(SCHED.view.getFullYear(), SCHED.view.getMonth()+d, 1); renderCalendar(); }
function selectDay(k){ SCHED.sel=k; renderCalendar(); }
function renderCalendar(){
  const y=SCHED.view.getFullYear(), mo=SCHED.view.getMonth();
  const first=new Date(y,mo,1), startDow=first.getDay(), days=new Date(y,mo+1,0).getDate();
  const byDate=scheduledByDate(), todayK=ymd(new Date());
  const today0=new Date(); today0.setHours(0,0,0,0);
  const dows=['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>'<div class="cal-dow">'+d+'</div>').join('');
  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="cal-day muted"></div>';
  for(let dn=1; dn<=days; dn++){
    const k=y+'-'+String(mo+1).padStart(2,'0')+'-'+String(dn).padStart(2,'0');
    const past=new Date(y,mo,dn)<today0;
    const has=byDate[k]&&byDate[k].length;
    const cls='cal-day'+(past?' muted':'')+(k===todayK?' today':'')+(k===SCHED.sel?' sel':'');
    cells+='<div class="'+cls+'"'+(past?'':' onclick="selectDay(\''+k+'\')"')+'>'+dn+(has?'<span class="dot" title="'+byDate[k].length+' scheduled"></span>':'')+'</div>';
  }
  let selBlock;
  if(SCHED.sel){
    const list=(byDate[SCHED.sel]||[]).map(p=>'<div class="it"><span>'+esc(p.serviceType||p.type||'post')+'</span><span>'+new Date(p.scheduledFor).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})+'</span></div>').join('');
    selBlock='<div class="cal-time"><span class="meta">Time (Tucson):</span><input type="time" id="cal-time" value="09:00"></div>'+
      '<div class="meta" style="margin-top:12px">Post to:</div>'+
      '<div style="display:flex;flex-direction:column;gap:6px;margin-top:6px;font-size:13px">'+
      '<label><input type="checkbox" id="ch-gbp" checked> Google Business Profile</label>'+
      '<label><input type="checkbox" id="ch-blog"> Blog article</label>'+
      '<label style="opacity:.5"><input type="checkbox" disabled> Facebook (soon)</label>'+
      '<label style="opacity:.5"><input type="checkbox" disabled> Instagram (soon)</label>'+
      '</div>'+
      '<div class="meta" style="margin-top:10px">Already scheduled on '+SCHED.sel+':</div>'+
      '<div class="cal-list">'+(list||'<div class="it">Nothing yet</div>')+'</div>';
  } else {
    selBlock='<p class="note" style="margin-top:12px">Tap a day to schedule. A green dot means posts are already booked that day.</p>';
  }
  document.getElementById('cal').innerHTML=
    '<div class="cal-hd"><b>'+first.toLocaleDateString('en-US',{month:'long',year:'numeric'})+'</b>'+
    '<div class="cal-nav"><button class="btn" onclick="calMove(-1)">‹</button><button class="btn" onclick="calMove(1)">›</button></div></div>'+
    '<div class="cal-grid">'+dows+cells+'</div>'+selBlock+
    '<div class="actions" style="margin-top:16px"><button class="btn green"'+(SCHED.sel?'':' disabled')+' onclick="confirmSchedule(this)">📅 Schedule this post</button>'+
    '<button class="btn" onclick="closeScheduler()">Cancel</button></div>';
}
async function confirmSchedule(btn){
  if(!SCHED.sel)return;
  const id=SCHED.target;
  const time=(document.getElementById('cal-time')||{}).value||'09:00';
  const when=new Date(SCHED.sel+'T'+time);
  if(isNaN(when.getTime())||when.getTime()<=Date.now()){alert('Pick a future date & time.');return;}
  const copy=(document.getElementById('copy-'+id)||{}).value||'';
  const ctaType=(document.getElementById('cta-'+id)||{}).value||'NONE';
  const ctaUrl=(document.getElementById('ctaurl-'+id)||{}).value||null;
  btn.disabled=true;btn.textContent='Scheduling…';
  const channels={ gbp:(document.getElementById('ch-gbp')||{checked:true}).checked, blog:(document.getElementById('ch-blog')||{checked:false}).checked };
  const body={id,finalCopy:copy,ctaType,ctaUrl,scheduledFor:when.toISOString(),channels};
  const cu=COMP[id]&&COMP[id].compositeUrl; if(cu) body.mediaUrls=[cu];
  try{ await api('/api/gbp-publish',{method:'POST',body:JSON.stringify(body)}); closeScheduler(); await load(); }
  catch(e){ alert(e.message); btn.disabled=false; btn.textContent='📅 Schedule this post'; }
}

/* ---- Before/after compositing (in-browser; GBP allows only one image/post) ---- */
const COMP={}; // id -> {order:[..], compositeUrl, building}
const CURRENT={}; // id -> source mediaUrls, kept so Swap can rebuild
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function loadImg(src){
  return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>rej(new Error('Could not load '+src));im.src=src;});
}

// side: 'seamRight' anchors the label to the inner (right) edge of a left cell;
// 'seamLeft' anchors to the inner (left) edge of a right cell. Keeping labels
// near the center seam means they survive GBP's center-crop thumbnail.
function drawLabel(ctx,text,cellX,cellW,canvasH,side){
  ctx.save();
  ctx.font='bold '+Math.round(canvasH*0.05)+'px system-ui,Segoe UI,Roboto,sans-serif';
  const padX=Math.round(canvasH*0.022), padY=Math.round(canvasH*0.014);
  const inset=Math.round(canvasH*0.03);
  const tw=ctx.measureText(text).width, bw=tw+padX*2, bh=Math.round(canvasH*0.05)+padY*2;
  const bx = side==='seamRight' ? (cellX+cellW-bw-inset) : (cellX+inset);
  const by = canvasH-bh-inset;
  ctx.fillStyle='rgba(0,0,0,0.62)';
  ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#fff';ctx.textBaseline='top';
  ctx.fillText(text,bx+padX,by+padY);
  ctx.restore();
}

// Stitch images side-by-side into a single JPEG data URL. order = indices into urls.
async function buildComposite(urls,order){
  const seq=(order&&order.length===urls.length)?order:urls.map((_,i)=>i);
  const imgs=await Promise.all(seq.map(i=>loadImg(urls[i])));
  const H=900,gut=12;
  const cells=imgs.map(im=>({w:Math.max(1,Math.round(im.width*(H/im.height))),im}));
  let totalW=cells.reduce((a,c)=>a+c.w,0)+gut*(cells.length-1);
  const scale=Math.min(1,2400/totalW);
  const cw=Math.round(totalW*scale),ch=Math.round(H*scale);
  const cv=document.createElement('canvas');cv.width=cw;cv.height=ch;
  const ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cw,ch);
  const labels=['BEFORE','AFTER'];let x=0;
  cells.forEach((c,i)=>{
    const w=Math.round(c.w*scale);
    ctx.drawImage(c.im,x,0,w,ch);
    if(cells.length===2) drawLabel(ctx,labels[i],x,w,ch,i===0?'seamRight':'seamLeft');
    x+=w+Math.round(gut*scale);
  });
  return cv.toDataURL('image/jpeg',0.85);
}

// Poll a media URL until the new deploy serves it (avoids publishing a 404).
async function waitLive(url,tries=40){
  for(let i=0;i<tries;i++){
    try{const r=await fetch(url+'?t='+Date.now(),{cache:'no-store'});if(r.ok)return true;}catch(e){}
    await sleep(3000);
  }
  return false;
}

function setStatus(id,msg,cls){
  const el=document.getElementById('comp-status-'+id);
  if(el){el.textContent=msg;el.className=(cls||'note');}
}
// Enable/disable the Publish + Schedule buttons together.
function setReady(id,on){
  ['pub-','sch-'].forEach(pfx=>{const b=document.getElementById(pfx+id);if(b)b.disabled=!on;});
}

// For a before/after post: show composite, upload it, wait until live, enable publish.
async function setupComposite(p){
  const id=p.id, urls=p.mediaUrls||[];
  const multi=urls.length>=2;
  const readyMsg=multi?'Before / after image ready ✓  (use Swap if the order is reversed)':'Image ready ✓';
  const workMsg=multi?'Stitching before / after image…':'Preparing image…';
  const st=COMP[id]||(COMP[id]={order:urls.map((_,i)=>i)});

  // Already have a committed composite and no pending re-stitch → reuse it.
  if(p.compositeUrl && !st.dirty){
    st.compositeUrl=p.compositeUrl;
    const im=document.getElementById('pv-img-'+id);
    if(im){im.src=p.compositeUrl;im.style.display='block';}
    const ni=document.getElementById('pv-noimg-'+id);if(ni)ni.style.display='none';
    setStatus(id,readyMsg,'ok');
    setReady(id,true);
    return;
  }

  if(st.building)return; st.building=true; st.dirty=false;
  setReady(id,false);
  try{
    setStatus(id,workMsg,'note');
    const dataUrl=await buildComposite(urls,st.order);
    // Instant local preview from the data URL.
    const im=document.getElementById('pv-img-'+id);
    if(im){im.src=dataUrl;im.style.display='block';}
    const ni=document.getElementById('pv-noimg-'+id);if(ni)ni.style.display='none';

    setStatus(id,'Uploading image…','note');
    const {url}=await api('/api/gbp-composite',{method:'POST',body:JSON.stringify({id,dataUrl})});
    st.compositeUrl=url;

    setStatus(id,'Publishing the image to the web (≈1 min)…','note');
    const live=await waitLive(url);
    if(live){
      setStatus(id,readyMsg,'ok');
      setReady(id,true);
    }else{
      setStatus(id,'Image uploaded but not live yet — wait a moment and hit Reload.','err');
    }
  }catch(e){
    setStatus(id,'Composite failed: '+e.message,'err');
  }finally{
    st.building=false;
  }
}

function swapBA(id){
  const st=COMP[id]||(COMP[id]={order:(CURRENT[id]||[]).map((_,i)=>i)});
  st.order=(st.order||[0,1]).slice().reverse();
  st.dirty=true;
  setupComposite({id,mediaUrls:CURRENT[id]||[],compositeUrl:null});
}

if(TOKEN){start();}
