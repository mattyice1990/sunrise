<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Sunrise GBP — Post Review</title>
<style>
  :root{--bg:#0f1216;--panel:#181d23;--bd:#2a323b;--tx:#e9eef3;--mut:#8b98a5;--acc:#f5a623;--grn:#2ea043;--red:#f85149;--blue:#2f81f7}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--bd)}
  header h1{font-size:17px;margin:0}
  .wrap{max-width:880px;margin:0 auto;padding:20px}
  .gate{max-width:420px;margin:80px auto;text-align:center}
  input,textarea,select{background:#0d1117;color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:9px;font:inherit}
  input,textarea{width:100%}
  textarea{min-height:130px;resize:vertical}
  .card{background:var(--panel);border:1px solid var(--bd);border-radius:12px;padding:16px;margin:14px 0}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .badge{font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:2px 9px;border-radius:999px;border:1px solid var(--bd);color:var(--mut)}
  .badge.new{color:var(--acc);border-color:var(--acc)}
  .badge.draft{color:var(--blue);border-color:var(--blue)}
  .badge.published{color:var(--grn);border-color:var(--grn)}
  .badge.failed{color:var(--red);border-color:var(--red)}
  .media{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .media img{width:110px;height:110px;object-fit:cover;border-radius:8px;border:1px solid var(--bd)}
  .note{color:var(--mut);font-size:13px;margin:6px 0}
  .btn{cursor:pointer;border:1px solid var(--bd);background:#202832;color:var(--tx);padding:8px 14px;border-radius:8px;font:inherit}
  .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn.green{background:var(--grn);border-color:var(--grn);color:#fff}
  .btn:disabled{opacity:.5;cursor:default}
  .ctaRow{display:flex;gap:8px;margin-top:8px}
  .ctaRow select{flex:0 0 150px}
  .muted{color:var(--mut)}
  .err{color:var(--red);font-size:13px}
  .ok{color:var(--grn);font-size:13px}
  .empty{color:var(--mut);text-align:center;padding:50px 0}
</style>
</head>
<body>
<div id="gate" class="gate">
  <h1>Sunrise GBP — Post Review</h1>
  <p class="muted">Enter your access token to continue.</p>
  <input id="token" type="password" placeholder="Bearer token" autocomplete="off">
  <p><button class="btn primary" onclick="saveToken()">Enter</button></p>
  <p id="gateErr" class="err"></p>
</div>

<div id="app" style="display:none">
  <header>
    <h1>Sunrise GBP — Post Review</h1>
    <div>
      <button class="btn" onclick="load()">Reload</button>
      <button class="btn" onclick="logout()">Sign out</button>
    </div>
  </header>
  <div class="wrap" id="list"><p class="empty">Loading…</p></div>
</div>

<script>
const CTA = ['NONE','CALL','LEARN_MORE','BOOK','ORDER','SHOP','SIGN_UP'];
let TOKEN = sessionStorage.getItem('gbp_token') || '';

function saveToken(){
  const v = document.getElementById('token').value.trim();
  if(!v){return}
  TOKEN = v; sessionStorage.setItem('gbp_token', v);
  start();
}
function logout(){ sessionStorage.removeItem('gbp_token'); location.reload(); }
function start(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  load();
}
async function api(path, opts={}){
  const res = await fetch(path, {
    ...opts,
    headers:{ 'Authorization':'Bearer '+TOKEN, 'Content-Type':'application/json', ...(opts.headers||{}) }
  });
  if(res.status===401){ throw new Error('Unauthorized — check your token'); }
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || ('HTTP '+res.status));
  return data;
}
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function load(){
  const list = document.getElementById('list');
  try{
    const {posts} = await api('/api/gbp-posts');
    if(!posts || !posts.length){ list.innerHTML='<p class="empty">No submissions yet. Text photos to the WhatsApp number to start.</p>'; return; }
    list.innerHTML = posts.map(render).join('');
  }catch(e){
    list.innerHTML = '<p class="err">'+esc(e.message)+'</p>';
    if(/Unauthorized/.test(e.message)){ sessionStorage.removeItem('gbp_token'); }
  }
}

function render(p){
  const media = (p.mediaUrls||[]).map(u=>`<img src="${esc(u)}" alt="">`).join('');
  const flag = p.qualityFlags && p.qualityFlags.needsResend
    ? `<p class="err">⚠ Claude flagged the photos: ${esc(p.qualityFlags.reason||'low quality')}</p>` : '';
  let actions = '';
  if(p.status==='new'){
    actions = `<button class="btn primary" onclick="gen('${p.id}',this)">Generate draft</button>`;
  } else if(p.status==='draft' || p.status==='failed'){
    const opts = CTA.map(c=>`<option ${c===(p.ctaType||'NONE')?'selected':''}>${c}</option>`).join('');
    actions = `
      <textarea id="copy-${p.id}" maxlength="1500">${esc(p.finalCopy||p.draftCopy||'')}</textarea>
      <div class="ctaRow">
        <select id="cta-${p.id}">${opts}</select>
        <input id="ctaurl-${p.id}" placeholder="CTA url (optional)" value="${esc(p.ctaUrl||'')}">
      </div>
      <p style="margin-top:10px">
        <button class="btn green" onclick="publish('${p.id}',this)">Approve &amp; publish</button>
        <button class="btn" onclick="gen('${p.id}',this)">Regenerate</button>
      </p>`;
  } else if(p.status==='published'){
    actions = `<p class="ok">Published ✓ ${p.gbpPostId?('· '+esc(p.gbpPostId)):''}</p>`;
  }
  return `<div class="card">
    <div class="row"><strong>${esc(p.type||'submission')}</strong><span class="badge ${p.status}">${p.status}</span></div>
    <p class="note">${esc(p.note||'(no note)')} · ${new Date(p.createdAt).toLocaleString()}</p>
    <div class="media">${media}</div>
    ${flag}
    ${p.error?('<p class="err">'+esc(p.error)+'</p>'):''}
    ${actions}
  </div>`;
}

async function gen(id, btn){
  btn.disabled=true; btn.textContent='Generating…';
  try{ await api('/api/gbp-generate',{method:'POST',body:JSON.stringify({id})}); await load(); }
  catch(e){ alert(e.message); btn.disabled=false; btn.textContent='Generate draft'; }
}
async function publish(id, btn){
  const copy = document.getElementById('copy-'+id).value;
  const ctaType = document.getElementById('cta-'+id).value;
  const ctaUrl = document.getElementById('ctaurl-'+id).value || null;
  btn.disabled=true; btn.textContent='Publishing…';
  try{ await api('/api/gbp-publish',{method:'POST',body:JSON.stringify({id,finalCopy:copy,ctaType,ctaUrl})}); await load(); }
  catch(e){ alert(e.message); btn.disabled=false; btn.textContent='Approve & publish'; }
}

if(TOKEN){ start(); }
</script>
</body>
</html>
