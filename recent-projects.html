<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recent Roofing Work Near You | Sunrise Roofing Tucson</title>
<meta name="description" content="See recent roofing projects and reviews from Sunrise Roofing across Tucson, Oro Valley, Marana, and the surrounding area.">
<link rel="canonical" href="https://roofwithsunrise.com/recent-projects">
<style>
  :root{--blue:#1a73e8;--ink:#1a2330;--mut:#5f6368;--bd:#e6e9ee;--bg:#f7f9fb;--star:#FBBC05}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:#fff}
  .np-h1{text-align:center;font-size:30px;font-weight:800;margin:26px 16px 18px}
  .np-bar{max-width:1320px;margin:0 auto;padding:0 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .np-search{flex:1;min-width:240px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:11px 14px}
  .np-search input{border:none;background:none;outline:none;font:inherit;width:100%;color:var(--ink)}
  .np-rating{display:flex;align-items:center;gap:7px;border:1px solid var(--bd);border-radius:10px;padding:9px 14px;font-weight:600;font-size:14px;white-space:nowrap}
  .np-rating .s{color:var(--star);letter-spacing:1px}
  .np-rating .c{color:var(--mut);font-weight:500}
  .np-contact{background:var(--blue);color:#fff;text-decoration:none;font-weight:600;padding:11px 20px;border-radius:24px;font-size:14px;white-space:nowrap}
  .np-wrap{max-width:1320px;margin:14px auto 0;padding:0 20px 56px;display:grid;grid-template-columns:1.15fr .85fr;gap:26px;align-items:start}
  .np-areah{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);padding-bottom:14px;margin-bottom:4px;flex-wrap:wrap;gap:12px}
  .np-areah h2{font-size:21px;margin:0}
  .np-stats{display:flex;gap:26px}
  .np-stat{text-align:center}
  .np-stat b{display:block;font-size:18px}
  .np-stat span{font-size:12px;color:var(--mut)}
  .np-sec{font-size:13px;font-weight:700;color:var(--mut);text-transform:none;margin:22px 0 12px}
  .np-rev-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x mandatory}
  .np-rev{flex:0 0 240px;scroll-snap-align:start;border:1px solid var(--bd);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;background:#fff}
  .np-rev .top{display:flex;align-items:center;gap:7px}
  .np-rev .st{color:var(--star);font-size:13px;letter-spacing:.5px}
  .np-rev .tx{font-size:13px;line-height:1.45;color:#3c4450;margin:0;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .np-rev .who{display:flex;align-items:center;gap:8px;margin-top:auto}
  .np-rev .who img{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(--bg)}
  .np-rev .who span{font-size:13px;font-weight:600}
  .np-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
  .np-card{border:1px solid var(--bd);border-radius:12px;overflow:hidden;background:#fff;cursor:pointer;transition:box-shadow .15s,border-color .15s}
  .np-card:hover,.np-card.active{box-shadow:0 6px 20px rgba(26,115,232,.16);border-color:var(--blue)}
  .np-card .ph{width:100%;aspect-ratio:16/11;object-fit:cover;display:block;background:var(--bg)}
  .np-cb{padding:13px 15px}
  .np-ct{font-size:15px;font-weight:700;margin:0 0 4px}
  .np-cmeta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 0 7px}
  .np-cdate{font-size:12px;color:var(--mut)}
  .np-cdesc{font-size:13px;line-height:1.45;color:var(--mut);margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .np-clink{font-size:12.5px;margin:8px 0 0}
  .np-clink a{color:var(--blue);text-decoration:none}
  #np-map{width:100%;height:760px;border-radius:14px;border:1px solid var(--bd);background:var(--bg);position:sticky;top:16px}
  .np-empty{color:var(--mut);padding:30px 0}
  .gicon{width:16px;height:16px;flex:0 0 16px;vertical-align:middle}
  @media(max-width:920px){.np-wrap{grid-template-columns:1fr}#np-map{height:360px;position:relative}}
</style>
</head>
<body>
  <h1 class="np-h1">Check out our work in your neighborhood</h1>
  <div class="np-bar">
    <div class="np-search">
      <svg class="gicon" viewBox="0 0 24 24" fill="none" stroke="#5f6368" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="np-q" placeholder="Search your city or area (e.g. Oro Valley)" autocomplete="off">
    </div>
    <div class="np-rating"><svg class="gicon" viewBox="0 0 48 48"><path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34A21.99 21.99 0 0 0 2 24c0 3.55.85 6.91 2.34 9.88l7.35-5.7z"/><path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/></svg>
      <span id="np-rscore">5.0</span><span class="s" id="np-rstars">★★★★★</span><span class="c" id="np-rcount">(0)</span></div>
    <a class="np-contact" href="/contact">Contact us</a>
  </div>

  <div class="np-wrap">
    <div class="np-left">
      <div class="np-areah">
        <h2 id="np-areatitle">Our work near Tucson, AZ</h2>
        <div class="np-stats">
          <div class="np-stat"><b id="np-pcount">0</b><span>Projects</span></div>
          <div class="np-stat"><b id="np-rcount2">0</b><span>Reviews</span></div>
          <div class="np-stat"><b id="np-avg">5.0</b><span>Avg. rating</span></div>
        </div>
      </div>
      <p class="np-sec" id="np-revh">Featured reviews</p>
      <div class="np-rev-row" id="np-reviews"></div>
      <p class="np-sec" id="np-projh">Featured projects</p>
      <div class="np-grid" id="np-projects"><p class="np-empty">Loading projects…</p></div>
    </div>
    <div id="np-map"></div>
  </div>

<script>
const MAPS_KEY='AIzaSyBvvwXnVB5WxLjHG091gU0R-uOBodS8pMM';
const TUCSON={lat:32.2226,lng:-110.9747};
const GICON='<svg class="gicon" viewBox="0 0 48 48"><path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34A21.99 21.99 0 0 0 2 24c0 3.55.85 6.91 2.34 9.88l7.35-5.7z"/><path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/></svg>';
let PROJECTS=[], REVIEWS=[], MAP, MARKERS={}, INFO, HOME;

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function stars(n){n=Math.round(n||5);var o='';for(var i=0;i<5;i++)o+=i<n?'★':'☆';return o;}
function fmtDate(s){if(!s)return '';var d=new Date(s);return isNaN(d)?'':d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

async function loadAll(){
  try{var p=await fetch('/recent-work.json?max=100').then(r=>r.json());PROJECTS=p.items||[];}catch(e){PROJECTS=[];}
  try{var r=await fetch('/api/reviews').then(r=>r.json());REVIEWS=r.reviews||[];window.__rating=r.rating||5;window.__total=r.totalReviews||0;}catch(e){REVIEWS=[];window.__total=0;window.__rating=5;}
  renderRatingBadge(); renderReviews(); applyFilter('');
  document.getElementById('np-q').addEventListener('input',function(){applyFilter(this.value.trim());});
}

function renderRatingBadge(){
  document.getElementById('np-rscore').textContent=(window.__rating||5).toFixed(1);
  document.getElementById('np-rcount').textContent='('+(window.__total||0)+')';
  document.getElementById('np-rcount2').textContent=window.__total||0;
  document.getElementById('np-avg').textContent=(window.__rating||5).toFixed(1);
}

function renderReviews(){
  var el=document.getElementById('np-reviews');
  if(!REVIEWS.length){el.innerHTML='<p class="np-empty">Reviews coming soon.</p>';return;}
  el.innerHTML=REVIEWS.map(function(rv){
    return '<div class="np-rev"><div class="top">'+GICON+'<span class="st">'+stars(rv.rating)+'</span></div>'
      +'<p class="tx">'+esc(rv.text)+'</p>'
      +'<div class="who">'+(rv.profile_photo_url?'<img src="'+esc(rv.profile_photo_url)+'" alt="">':'')+'<span>'+esc(rv.author_name)+'</span></div></div>';
  }).join('');
}

function matchArea(p,q){ if(!q)return true; q=q.toLowerCase();
  return (p.city||'').toLowerCase().indexOf(q)>=0 || (p.title||'').toLowerCase().indexOf(q)>=0 || (p.service_type||'').toLowerCase().indexOf(q)>=0; }

function applyFilter(q){
  var items=PROJECTS.filter(function(p){return matchArea(p,q);});
  document.getElementById('np-pcount').textContent=items.length;
  var areaLabel = q ? ('Our work near '+q.replace(/\b\w/g,function(c){return c.toUpperCase();})) : 'Our work near Tucson, AZ';
  document.getElementById('np-areatitle').textContent=areaLabel;
  renderProjects(items); plotPins(items);
}

function renderProjects(items){
  var el=document.getElementById('np-projects');
  if(!items.length){el.innerHTML='<p class="np-empty">No projects match that search yet.</p>';return;}
  el.innerHTML=items.map(function(i){
    return '<div class="np-card" id="np-card-'+esc(i.id)+'" onclick="focusItem(\''+esc(i.id)+'\')" '
      +'onmouseenter="hoverItem(\''+esc(i.id)+'\',true)" onmouseleave="hoverItem(\''+esc(i.id)+'\',false)">'
      +(i.image_url?'<img class="ph" src="'+esc(i.image_url)+'" alt="'+esc(i.title)+'" loading="lazy">':'')
      +'<div class="np-cb"><p class="np-ct">'+esc(i.title)+'</p>'
      +'<div class="np-cmeta"><span class="np-cdate">'+esc(fmtDate(i.published_at))+'</span><span class="st" style="color:var(--star);font-size:13px">'+GICON+' '+stars(5)+'</span></div>'
      +'<p class="np-cdesc">'+esc(i.short_description)+'</p>'
      +'<p class="np-clink"><a href="'+esc(i.service_page_url)+'">'+esc(i.service_type)+'</a>'
      +(i.location_page_url?' · <a href="'+esc(i.location_page_url)+'">Roofing in '+esc(i.city)+'</a>':'')+'</p></div></div>';
  }).join('');
}

function plotPins(items){
  if(!MAP)return;
  Object.values(MARKERS).forEach(function(m){m.setMap(null);});MARKERS={};
  var bounds=new google.maps.LatLngBounds(); bounds.extend(TUCSON);
  items.forEach(function(i){
    if(typeof i.approximate_lat!=='number')return;
    var pos={lat:i.approximate_lat,lng:i.approximate_lng};
    var m=new google.maps.Marker({position:pos,map:MAP,title:i.title});
    m.addListener('click',function(){openInfo(i,m);});
    MARKERS[i.id]=m; bounds.extend(pos);
  });
  if(Object.keys(MARKERS).length) MAP.fitBounds(bounds);
  else { MAP.setCenter(TUCSON); MAP.setZoom(11); }
}

function openInfo(i,m){
  if(!INFO)INFO=new google.maps.InfoWindow();
  INFO.setContent('<div style="font-family:system-ui;max-width:230px"><b style="font-size:13px">'+esc(i.title)+'</b>'
    +'<p style="font-size:12px;color:#5f6368;margin:4px 0 6px">'+esc(String(i.short_description).slice(0,130))+'…</p>'
    +'<a href="'+esc(i.cta_url)+'" style="color:#1a73e8;font-weight:600;text-decoration:none;font-size:13px">'+esc(i.cta_text)+' →</a></div>');
  INFO.open(MAP,m);
}
function focusItem(id){var m=MARKERS[id],i=PROJECTS.filter(function(x){return x.id===id;})[0];if(m&&MAP){MAP.panTo(m.getPosition());MAP.setZoom(13);openInfo(i,m);}}
function hoverItem(id,on){var c=document.getElementById('np-card-'+id);if(c)c.classList.toggle('active',on);var m=MARKERS[id];if(m)m.setAnimation(on?google.maps.Animation.BOUNCE:null);}

window.initNeighborhood=function(){
  MAP=new google.maps.Map(document.getElementById('np-map'),{center:TUCSON,zoom:11,mapTypeControl:false,streetViewControl:false,fullscreenControl:false});
  HOME=new google.maps.Marker({position:TUCSON,map:MAP,title:'Sunrise Roofing — Tucson',
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:'#34A853',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}});
  applyFilter(document.getElementById('np-q').value.trim());
};

(function(){
  loadAll();
  var s=document.createElement('script');
  s.src='https://maps.googleapis.com/maps/api/js?key='+MAPS_KEY+'&loading=async&callback=initNeighborhood';
  s.async=true;document.head.appendChild(s);
})();
</script>
</body>
</html>
