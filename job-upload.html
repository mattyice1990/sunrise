<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#F0801C" />
  <link rel="icon" type="image/jpeg" href="/SunriseLogo.jpeg" />
  <link rel="apple-touch-icon" href="/SunriseLogo.jpeg" />
  <title>Sunrise — Send Job Photos</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1c1714;color:#f4efe9;line-height:1.5;-webkit-text-size-adjust:100%}
    .wrap{max-width:560px;margin:0 auto;padding:20px 16px 48px;min-height:100vh}
    header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    header img{height:44px;width:auto;border-radius:8px}
    header h1{font-size:18px;font-weight:700}
    header .sub{font-size:13px;color:#b9ada0}
    .card{background:#26201c;border:1px solid #3a322c;border-radius:14px;padding:18px;margin-bottom:16px}
    .big-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;width:100%;min-height:130px;border:2px dashed #5a4d43;border-radius:14px;background:#221c18;color:#f4efe9;font-size:17px;font-weight:600;cursor:pointer}
    .big-btn .ic{font-size:34px}
    input[type=file]{display:none}
    textarea{width:100%;background:#1c1714;border:1px solid #3a322c;border-radius:10px;color:#f4efe9;padding:12px;font-size:16px;font-family:inherit;min-height:64px;resize:vertical}
    label.fld{display:block;font-size:13px;color:#b9ada0;margin:0 0 6px}
    .thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:14px}
    .thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid #3a322c}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .thumb .pin{position:absolute;left:4px;bottom:4px;font-size:11px;background:rgba(0,0,0,.6);border-radius:6px;padding:1px 5px}
    .thumb .x{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);border:none;color:#fff;width:22px;height:22px;border-radius:50%;font-size:14px;cursor:pointer}
    .loc{display:flex;align-items:center;gap:10px;margin-top:14px;padding:12px;border-radius:10px;font-size:14px}
    .loc.ok{background:#1e2c1e;border:1px solid #2f4a2f}
    .loc.warn{background:#2c261a;border:1px solid #4a3f24}
    .loc.none{background:#2c1e1e;border:1px solid #4a2f2f}
    .loc .lic{font-size:20px}
    .submit{width:100%;background:#F0801C;color:#1c1714;border:none;border-radius:12px;padding:16px;font-size:18px;font-weight:800;cursor:pointer;margin-top:6px}
    .submit:disabled{opacity:.5}
    .note-sm{font-size:12px;color:#8f8478;margin-top:10px;text-align:center}
    .done{text-align:center;padding:30px 10px}
    .done .ic{font-size:54px}
    .done h2{font-size:22px;margin:10px 0 6px}
    .hide{display:none}
    a.again{color:#F0801C;font-weight:700;text-decoration:none;display:inline-block;margin-top:16px}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="/SunriseLogo.jpeg" alt="Sunrise Roofers" />
      <div>
        <h1>Send Today's Job Photos</h1>
        <div class="sub">Snap or pick photos — we'll handle the rest.</div>
      </div>
    </header>

    <div id="form">
      <div class="card">
        <label class="big-btn" for="picker">
          <span class="ic">📸</span>
          <span id="pickLabel">Tap to add job photos</span>
        </label>
        <input id="picker" type="file" accept="image/*" multiple />
        <div class="thumbs" id="thumbs"></div>
        <div id="locBox"></div>
      </div>

      <div class="card">
        <label class="fld" for="note">Anything to add? (optional — town, what you did)</label>
        <textarea id="note" placeholder="e.g. tile underlayment redo off Ina Rd"></textarea>
      </div>

      <button class="submit" id="send" disabled>Send to the office</button>
      <p class="note-sm" id="status">Your location is read from the photos automatically. Add it to your home screen for one-tap access.</p>
    </div>

    <div id="done" class="done hide">
      <div class="ic">✅</div>
      <h2>Got it — thanks!</h2>
      <p id="doneMsg" class="sub"></p>
      <a class="again" href="#" onclick="location.reload();return false">Send another job →</a>
    </div>
  </div>

  <!-- exifr: reads GPS out of the original photo (incl. iPhone HEIC) entirely on-device -->
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>
  <script>
    var KEY = new URLSearchParams(location.search).get('k') || '';
    var items = [];        // { dataUrl, gps:{lat,lng}|null }
    var liveCoords = null; // {lat,lng} current device location (fallback)

    // Ask for live location early (best-effort) so it's ready as a fallback.
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function (p) { liveCoords = { lat: p.coords.latitude, lng: p.coords.longitude }; renderLoc(); },
        function () {}, { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
      );
    }

    document.getElementById('picker').addEventListener('change', function (e) {
      handleFiles(e.target.files);
      e.target.value = '';
    });

    async function handleFiles(fileList) {
      for (var i = 0; i < fileList.length && items.length < 8; i++) {
        var file = fileList[i];
        var gps = null;
        try {
          var g = await exifr.gps(file);
          if (g && isFinite(g.latitude) && isFinite(g.longitude)) gps = { lat: g.latitude, lng: g.longitude };
        } catch (err) { /* no exif */ }
        var dataUrl = await downscale(file, 1280, 0.82);
        items.push({ dataUrl: dataUrl, gps: gps });
      }
      render();
    }

    // Resize on a canvas so uploads stay small. EXIF is read from the ORIGINAL
    // above, before this — canvas re-encoding drops metadata, which is fine.
    function downscale(file, maxDim, quality) {
      return new Promise(function (resolve) {
        var img = new Image();
        var url = URL.createObjectURL(file);
        img.onload = function () {
          var w = img.width, h = img.height;
          var scale = Math.min(1, maxDim / Math.max(w, h));
          var c = document.createElement('canvas');
          c.width = Math.round(w * scale); c.height = Math.round(h * scale);
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          URL.revokeObjectURL(url);
          resolve(c.toDataURL('image/jpeg', quality));
        };
        img.onerror = function () { URL.revokeObjectURL(url); resolve(null); };
        img.src = url;
      });
    }

    function chosenLocation() {
      var withGps = items.find(function (it) { return it.gps; });
      if (withGps) return { lat: withGps.gps.lat, lng: withGps.gps.lng, source: 'photo' };
      if (liveCoords) return { lat: liveCoords.lat, lng: liveCoords.lng, source: 'live' };
      return null;
    }

    function render() {
      var t = document.getElementById('thumbs');
      t.innerHTML = items.map(function (it, i) {
        return '<div class="thumb"><img src="' + it.dataUrl + '" alt="">' +
          (it.gps ? '<span class="pin">📍</span>' : '') +
          '<button class="x" onclick="removeItem(' + i + ')">✕</button></div>';
      }).join('');
      document.getElementById('pickLabel').textContent = items.length ? ('Add more (' + items.length + '/8)') : 'Tap to add job photos';
      document.getElementById('send').disabled = items.length === 0;
      renderLoc();
    }
    function removeItem(i) { items.splice(i, 1); render(); }

    function renderLoc() {
      var box = document.getElementById('locBox');
      if (!items.length) { box.innerHTML = ''; return; }
      var loc = chosenLocation();
      if (loc && loc.source === 'photo') {
        box.innerHTML = '<div class="loc ok"><span class="lic">📍</span><span>Location locked from the photo — exact job site.</span></div>';
      } else if (loc && loc.source === 'live') {
        box.innerHTML = '<div class="loc warn"><span class="lic">📍</span><span>Using your phone\'s current spot (photo had no location). Best if you send from the job.</span></div>';
      } else {
        box.innerHTML = '<div class="loc none"><span class="lic">📍</span><span>No location yet — allow location, or just send and we\'ll sort it out.</span></div>';
      }
    }

    document.getElementById('send').addEventListener('click', async function () {
      var btn = this;
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        var res = await fetch('/api/gbp-upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            key: KEY,
            note: document.getElementById('note').value || '',
            location: chosenLocation(),
            photos: items.map(function (it) { return it.dataUrl; })
          })
        });
        var out = await res.json().catch(function () { return {}; });
        if (!res.ok) throw new Error(out.error || ('Upload failed (' + res.status + ')'));
        document.getElementById('form').classList.add('hide');
        var d = document.getElementById('done');
        d.classList.remove('hide');
        document.getElementById('doneMsg').textContent = out.area
          ? ('Logged at ' + out.area + '. The office will post it.')
          : 'The office will take it from here.';
      } catch (e) {
        alert(e.message);
        btn.disabled = false; btn.textContent = 'Send to the office';
      }
    });
  </script>
</body>
</html>
